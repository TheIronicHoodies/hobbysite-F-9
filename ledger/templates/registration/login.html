<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <style>
            * {
                box-sizing: border-box;
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            }

            body {
                background-color: bisque;
            }

            a {
                color: #0088cc;
                text-decoration: none;
            }

            a:visited {
                font-weight: bold;
            }

            header {
                background-color: coral;
                color: #1A1066;
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                font-size: 2em;
                padding: 1rem;
            }

            section {
                display: flex;
                flex-direction: column;
                font-size: 1em;
                padding: 1em;
            }

            .author {
                font-size: 1em;
                font-style: italic;
            }

            .recipename {
                margin-left: 1em;
            }
        </style>
    </head>
    <body>
        <header>
            <span>Recipe Book</span>
        </header>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
    </body>
</html>
